spring.application.name=login-app

# ─── Base de datos MySQL (Railway / Local) ────────────────────────────────────
# Railway inyectará variables MYSQLHOST, MYSQLPORT, MYSQLDATABASE, etc.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:login_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── Servidor ─────────────────────────────────────────────────────────────────
# Railway expone el puerto a través de la variable $PORT
server.port=${PORT:8080}
