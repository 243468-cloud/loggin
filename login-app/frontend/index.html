<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Generic App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Variables ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f17;
      --surface:   #151929;
      --surface2:  #1e2438;
      --accent:    #5d6af0;
      --accent-h:  #7b87ff;
      --accent-glow: rgba(93, 106, 240, 0.35);
      --text:      #e8eaf6;
      --muted:     #8892b0;
      --error:     #ff6b7a;
      --success:   #43d4a0;
      --border:    rgba(255,255,255,0.07);
      --radius:    14px;
      --ff:        'Inter', sans-serif;
    }

    body {
      font-family: var(--ff);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      /* Subtle animated gradient bg */
      background:
        radial-gradient(ellipse 80% 60% at 20% -10%, rgba(93,106,240,.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 110%, rgba(67,212,160,.12) 0%, transparent 60%),
        #0d0f17;
    }

    /* ─── Card ──────────────────────────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.03);
      animation: fadeUp .45s ease both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ─── Logo / Header ─────────────────────────────────────────────────── */
    .logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--accent) 0%, #9e6af0 100%);
      border-radius: 14px;
      display: grid; place-items: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 8px 24px var(--accent-glow);
    }
    .logo svg { width: 26px; height: 26px; fill: #fff; }

    h1 { text-align: center; font-size: 1.5rem; font-weight: 700; letter-spacing: -.3px; margin-bottom: .4rem; }
    .subtitle { text-align: center; font-size: .875rem; color: var(--muted); margin-bottom: 2rem; }

    /* ─── Tabs ──────────────────────────────────────────────────────────── */
    .tabs {
      display: flex; gap: 4px;
      background: var(--surface2);
      border-radius: 10px; padding: 4px;
      margin-bottom: 1.75rem;
    }
    .tab {
      flex: 1; padding: .5rem; border: none; border-radius: 8px;
      background: transparent; color: var(--muted); font-family: var(--ff);
      font-size: .875rem; font-weight: 500; cursor: pointer;
      transition: background .2s, color .2s;
    }
    .tab.active { background: var(--surface); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,.3); }

    /* ─── Form ──────────────────────────────────────────────────────────── */
    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-size: .8rem; font-weight: 500; color: var(--muted); margin-bottom: .4rem; letter-spacing: .4px; text-transform: uppercase; }

    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    .input-icon svg { width: 17px; height: 17px; }

    input {
      width: 100%; padding: .72rem .9rem .72rem 2.4rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: var(--ff);
      font-size: .9rem; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    input::placeholder { color: #454d6a; }

    .toggle-pw {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted);
      padding: 4px;
      transition: color .2s;
    }
    .toggle-pw:hover { color: var(--text); }
    .toggle-pw svg { width: 17px; height: 17px; }

    /* ─── Alert ─────────────────────────────────────────────────────────── */
    #alert-box {
      border-radius: 9px; padding: .75rem 1rem;
      font-size: .85rem; font-weight: 500;
      margin-bottom: 1.1rem; display: none;
      animation: slideIn .25s ease;
    }
    @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }
    #alert-box.error   { background: rgba(255,107,122,.12); border: 1px solid rgba(255,107,122,.3); color: var(--error); }
    #alert-box.success { background: rgba(67,212,160,.12);  border: 1px solid rgba(67,212,160,.3);  color: var(--success); }

    /* ─── Button ─────────────────────────────────────────────────────────── */
    .btn {
      width: 100%; padding: .8rem; border: none; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent) 0%, #7b5af0 100%);
      color: #fff; font-family: var(--ff); font-size: .95rem; font-weight: 600;
      cursor: pointer; margin-top: .5rem;
      box-shadow: 0 4px 18px var(--accent-glow);
      transition: transform .15s, box-shadow .15s, opacity .15s;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    .btn:hover  { transform: translateY(-1px); box-shadow: 0 8px 24px var(--accent-glow); }
    .btn:active { transform: translateY(1px);  box-shadow: none; }
    .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* Spinner */
    .spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:none; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .btn.loading .spinner { display:block; }
    .btn.loading .btn-text { opacity:.7; }

    /* ─── Footer ─────────────────────────────────────────────────────────── */
    .card-footer { margin-top: 1.4rem; text-align: center; font-size: .8rem; color: var(--muted); }
    .card-footer a { color: var(--accent-h); text-decoration: none; font-weight: 500; }
    .card-footer a:hover { text-decoration: underline; }

    /* ─── User Table (panel post-login) ─────────────────────────────────── */
    #panel { display:none; }
    .panel-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.2rem;
    }
    .panel-header h2 { font-size: 1.1rem; }
    .badge { padding:.25rem .65rem; border-radius:99px; font-size:.7rem; font-weight:600; background:rgba(93,106,240,.2); color:var(--accent-h); border:1px solid rgba(93,106,240,.3); }

    table { width:100%; border-collapse:collapse; font-size:.82rem; }
    th { text-align:left; padding:.6rem .8rem; color:var(--muted); font-weight:500; border-bottom:1px solid var(--border); text-transform:uppercase; font-size:.7rem; letter-spacing:.4px; }
    td { padding:.65rem .8rem; border-bottom:1px solid rgba(255,255,255,.04); }
    tr:last-child td { border-bottom:none; }
    .del-btn { background:rgba(255,107,122,.1); border:1px solid rgba(255,107,122,.25); color:var(--error); border-radius:7px; padding:.25rem .6rem; font-size:.75rem; cursor:pointer; transition:background .2s; }
    .del-btn:hover { background:rgba(255,107,122,.2); }

    .logout-btn { background:var(--surface2); border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:.4rem .9rem; font-size:.8rem; cursor:pointer; font-family:var(--ff); transition:color .2s; }
    .logout-btn:hover { color:var(--text); }

    @media (max-width:460px) {
      .card { margin:1rem; padding:1.75rem 1.25rem; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════ LOGIN CARD -->
<div class="card" id="login-card">

  <!-- Logo -->
  <div class="logo" aria-hidden="true">
    <svg viewBox="0 0 24 24"><path d="M12 1a5 5 0 1 0 0 10A5 5 0 0 0 12 1zm0 12c-5.33 0-8 2.67-8 4v2h16v-2c0-1.33-2.67-4-8-4z"/></svg>
  </div>

  <h1>Bienvenido</h1>
  <p class="subtitle">Inicia sesión o crea tu cuenta</p>

  <!-- Tabs -->
  <div class="tabs" role="tablist">
    <button class="tab active" id="tab-login"    onclick="switchTab('login')"    role="tab">Iniciar Sesión</button>
    <button class="tab"        id="tab-register"  onclick="switchTab('register')" role="tab">Registrarse</button>
  </div>

  <!-- Alert -->
  <div id="alert-box" role="alert"></div>

  <!-- ── Login Form ── -->
  <form id="form-login" novalidate>
    <div class="form-group">
      <label for="l-username">Usuario</label>
      <div class="input-wrap">
        <span class="input-icon"><!-- user icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </span>
        <input type="text" id="l-username" name="username" placeholder="tu_usuario" autocomplete="username" required />
      </div>
    </div>

    <div class="form-group">
      <label for="l-password">Contraseña</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input type="password" id="l-password" name="password" placeholder="••••••••" autocomplete="current-password" required />
        <button type="button" class="toggle-pw" onclick="togglePw('l-password',this)" aria-label="Mostrar contraseña">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn" id="btn-login">
      <span class="spinner"></span>
      <span class="btn-text">Iniciar Sesión</span>
    </button>
  </form>

  <!-- ── Register Form ── -->
  <form id="form-register" novalidate style="display:none;">
    <div class="form-group">
      <label for="r-username">Usuario</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </span>
        <input type="text" id="r-username" name="username" placeholder="mi_usuario" autocomplete="username" required />
      </div>
    </div>

    <div class="form-group">
      <label for="r-email">Correo electrónico</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        </span>
        <input type="email" id="r-email" name="email" placeholder="correo@ejemplo.com" autocomplete="email" required />
      </div>
    </div>

    <div class="form-group">
      <label for="r-password">Contraseña</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input type="password" id="r-password" name="password" placeholder="mínimo 6 caracteres" autocomplete="new-password" required />
        <button type="button" class="toggle-pw" onclick="togglePw('r-password',this)" aria-label="Mostrar contraseña">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn" id="btn-register">
      <span class="spinner"></span>
      <span class="btn-text">Crear Cuenta</span>
    </button>
  </form>

  <div class="card-footer">
    <span id="footer-text">¿No tienes cuenta? <a href="#" onclick="switchTab('register');return false;">Regístrate</a></span>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ PANEL DASHBOARD -->
<div class="card" id="panel">
  <div class="panel-header">
    <div>
      <h2 id="welcome-msg">¡Bienvenido!</h2>
      <p style="font-size:.8rem;color:var(--muted);margin-top:.2rem">Panel de administración</p>
    </div>
    <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
  </div>

  <div id="alert-panel" style="display:none;" class="alert-box"></div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Usuario</th>
        <th>Email</th>
        <th>Rol</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="users-tbody">
      <tr><td colspan="5" style="text-align:center;color:var(--muted)">Cargando...</td></tr>
    </tbody>
  </table>
</div>

<!-- ═══════════════════════════════════════════════════════ JS -->
<script>
  const API = 'http://localhost:8080/api/users';
  let currentUser = null;

  // ── Tabs ─────────────────────────────────────────────────────────────────
  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('form-login').style.display    = isLogin ? '' : 'none';
    document.getElementById('form-register').style.display = isLogin ? 'none' : '';
    document.getElementById('tab-login').classList.toggle('active', isLogin);
    document.getElementById('tab-register').classList.toggle('active', !isLogin);
    document.getElementById('footer-text').innerHTML = isLogin
      ? '¿No tienes cuenta? <a href="#" onclick="switchTab(\'register\');return false;">Regístrate</a>'
      : '¿Ya tienes cuenta? <a href="#" onclick="switchTab(\'login\');return false;">Inicia sesión</a>';
    hideAlert();
  }

  // ── Alerts ────────────────────────────────────────────────────────────────
  function showAlert(msg, type = 'error') {
    const el = document.getElementById('alert-box');
    el.textContent = msg;
    el.className = type;
    el.style.display = 'block';
  }
  function hideAlert() { document.getElementById('alert-box').style.display = 'none'; }

  // ── Toggle password ───────────────────────────────────────────────────────
  function togglePw(inputId, btn) {
    const input = document.getElementById(inputId);
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    btn.innerHTML = show
      ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  }

  // ── Loading state ─────────────────────────────────────────────────────────
  function setLoading(btnId, on) {
    const btn = document.getElementById(btnId);
    btn.classList.toggle('loading', on);
    btn.disabled = on;
  }

  // ── LOGIN ─────────────────────────────────────────────────────────────────
  document.getElementById('form-login').addEventListener('submit', async e => {
    e.preventDefault(); hideAlert();
    const username = document.getElementById('l-username').value.trim();
    const password = document.getElementById('l-password').value;
    if (!username || !password) return showAlert('Completa todos los campos.');

    setLoading('btn-login', true);
    try {
      const res  = await fetch(`${API}/login`, {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error al iniciar sesión');
      currentUser = data.user;
      showPanel();
    } catch (err) {
      showAlert(err.message);
    } finally {
      setLoading('btn-login', false);
    }
  });

  // ── REGISTER ──────────────────────────────────────────────────────────────
  document.getElementById('form-register').addEventListener('submit', async e => {
    e.preventDefault(); hideAlert();
    const username = document.getElementById('r-username').value.trim();
    const email    = document.getElementById('r-email').value.trim();
    const password = document.getElementById('r-password').value;
    if (!username || !email || !password) return showAlert('Completa todos los campos.');

    setLoading('btn-register', true);
    try {
      const res  = await fetch(`${API}/register`, {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ username, email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error al registrarse');
      showAlert('¡Cuenta creada! Inicia sesión.', 'success');
      document.getElementById('form-register').reset();
      setTimeout(() => switchTab('login'), 1500);
    } catch (err) {
      showAlert(err.message);
    } finally {
      setLoading('btn-register', false);
    }
  });

  // ── PANEL ─────────────────────────────────────────────────────────────────
  async function showPanel() {
    document.getElementById('login-card').style.display = 'none';
    document.getElementById('panel').style.display      = 'block';
    document.getElementById('welcome-msg').textContent  = `¡Hola, ${currentUser.username}!`;
    await loadUsers();
  }

  async function loadUsers() {
    const tbody = document.getElementById('users-tbody');
    try {
      const res   = await fetch(API);
      const users = await res.json();
      tbody.innerHTML = users.map(u => `
        <tr>
          <td>${u.id}</td>
          <td>${u.username}</td>
          <td>${u.email}</td>
          <td><span class="badge">${u.role}</span></td>
          <td><button class="del-btn" onclick="deleteUser(${u.id})">Eliminar</button></td>
        </tr>`).join('');
    } catch {
      tbody.innerHTML = '<tr><td colspan="5" style="color:var(--error);text-align:center">Error al cargar usuarios</td></tr>';
    }
  }

  // ── DELETE ────────────────────────────────────────────────────────────────
  async function deleteUser(id) {
    if (!confirm(`¿Eliminar usuario #${id}?`)) return;
    try {
      const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error('No se pudo eliminar');
      await loadUsers();
    } catch (err) {
      alert(err.message);
    }
  }

  // ── LOGOUT ────────────────────────────────────────────────────────────────
  function logout() {
    currentUser = null;
    document.getElementById('panel').style.display      = 'none';
    document.getElementById('login-card').style.display = 'block';
    document.getElementById('form-login').reset();
    switchTab('login');
  }
</script>
</body>
</html>
